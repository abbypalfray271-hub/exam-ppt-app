version: '3.8'

services:
  exam-ppt-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_MODEL_NAME=gemini-3-flash-preview
        - NEXT_PUBLIC_API_BASE_URL=https://api.devdove.site/v1
    container_name: exam-ppt-app
    restart: always
    ports:
      - "3004:3000"
    environment:
      - NODE_ENV=production
      # API_KEY 是服务端运行时使用的，必须在此注入
      - API_KEY=sk-6PSePN7C8I36tBHLQ20tqnyVeOgjQGVvVJSOW7LuaXPLJ09A
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
